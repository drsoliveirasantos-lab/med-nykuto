name: QCM Debug Only

on:
  workflow_dispatch:
  push:
    branches: [preview]
    paths:
      - qcm.html
      - app.bundle.js
      - practice-critical-click-fallback-v101.js
      - tests/qcm-critical-clicks.spec.js
      - scripts/print-playwright-summary.js
      - .github/workflows/qcm-debug.yml

concurrency:
  group: med-nykuto-qcm-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qcm-debug:
    name: QCM critical debug with trace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run QCM critical debug
        run: |
          set +e
          set -o pipefail
          PLAYWRIGHT_JSON_OUTPUT_NAME=qcm-debug.json npx playwright test tests/qcm-critical-clicks.spec.js --project=desktop-chromium --trace=on --output=test-results/qcm-debug --reporter=line,json 2>&1 | tee qcm-debug.log
          code=${PIPESTATUS[0]}
          node scripts/print-playwright-summary.js qcm-debug.json 2>&1 | tee -a qcm-debug.log || true
          exit $code
      - name: Upload QCM debug evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qcm-debug-evidence
          if-no-files-found: ignore
          path: |
            qcm-debug.log
            qcm-debug.json
            test-results/qcm-debug/**
            playwright-report/**
