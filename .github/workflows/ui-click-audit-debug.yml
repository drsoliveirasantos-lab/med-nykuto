name: Med Nykuto click audit UI debug

on:
  workflow_dispatch:

concurrency:
  group: med-nykuto-click-audit-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  click-audit-debug:
    name: Click audit UI debug
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Quiet clone and test click audit
        run: |
          set -e
          git clone --quiet --depth=1 --branch preview https://x-access-token:${{ github.token }}@github.com/drsoliveirasantos-lab/med-nykuto.git .
          npm install --silent >/tmp/npm-install.log 2>&1 || { cat /tmp/npm-install.log; exit 1; }
          timeout 240s npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1 || { tail -80 /tmp/playwright-install.log; exit 1; }
          npx playwright test tests/click-audit.spec.js --project=desktop-chromium --reporter=line
