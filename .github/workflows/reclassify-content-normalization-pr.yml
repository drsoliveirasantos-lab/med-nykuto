name: Reclassify content normalization source from PR

on:
  pull_request:
    branches:
      - preview
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  reclassify:
    if: github.head_ref == 'refactor/reclassify-content-normalization-source'
    name: Reclassify content normalization fragment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reclassify, rebuild and validate app.bundle.js
        run: |
          cp app.bundle.js /tmp/app.bundle.original.js
          node scripts/reclassify-content-normalization-source.js
          node scripts/validate-app-bundle-split.js
          node scripts/build-app-bundle.js
          cmp app.bundle.js /tmp/app.bundle.original.js
          node scripts/validate-app-bundle-split.js

      - name: Commit reclassified source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-bundle src/i18n scripts/reclassify-content-normalization-source.js README_APP_BUNDLE_SPLIT.md
          if git diff --cached --quiet; then
            echo "No reclassification changes."
            exit 0
          fi
          git commit -m "Reclassify content normalization app bundle fragment"
          git push origin HEAD:${{ github.head_ref }}
