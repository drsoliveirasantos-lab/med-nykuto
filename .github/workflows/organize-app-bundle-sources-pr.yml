name: Organize app bundle sources from PR

on:
  pull_request:
    branches:
      - preview
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  organize:
    if: github.head_ref == 'refactor/organize-app-bundle-sources'
    name: Organize app bundle fragments into domain folders
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Organize, rebuild and validate app.bundle.js
        run: |
          cp app.bundle.js /tmp/app.bundle.original.js
          node scripts/organize-app-bundle-sources.js
          node scripts/validate-app-bundle-split.js
          node scripts/build-app-bundle.js
          cmp app.bundle.js /tmp/app.bundle.original.js
          node scripts/validate-app-bundle-split.js

      - name: Commit organized sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-bundle scripts/organize-app-bundle-sources.js README_APP_BUNDLE_SPLIT.md
          if git diff --cached --quiet; then
            echo "No organization changes."
            exit 0
          fi
          git commit -m "Organize app bundle fragments by domain"
          git push origin HEAD:${{ github.head_ref }}
