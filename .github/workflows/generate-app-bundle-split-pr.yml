name: Generate app bundle split from PR

on:
  pull_request:
    branches:
      - preview
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  split:
    if: github.head_ref == 'refactor/split-app-bundle'
    name: Generate split app.bundle sources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Split, rebuild and validate app.bundle.js
        run: |
          node scripts/split-app-bundle.js
          node scripts/validate-app-bundle-split.js
          cp app.bundle.js /tmp/app.bundle.original.js
          node scripts/build-app-bundle.js
          cmp app.bundle.js /tmp/app.bundle.original.js
          node scripts/validate-app-bundle-split.js

      - name: Commit generated split sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-bundle scripts/split-app-bundle.js scripts/build-app-bundle.js scripts/validate-app-bundle-split.js README_APP_BUNDLE_SPLIT.md
          if git diff --cached --quiet; then
            echo "No app bundle split changes."
            exit 0
          fi
          git commit -m "Split app.bundle into ordered source fragments"
          git push origin HEAD:${{ github.head_ref }}
