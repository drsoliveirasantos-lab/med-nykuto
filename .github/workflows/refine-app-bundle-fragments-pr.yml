name: Refine app bundle fragments from PR

on:
  pull_request:
    branches:
      - preview
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  refine:
    if: github.head_ref == 'refactor/refine-app-bundle-fragments'
    name: Refine oversized app bundle fragments
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refine, rebuild and validate app.bundle.js
        run: |
          cp app.bundle.js /tmp/app.bundle.original.js
          node scripts/refine-app-bundle-fragments.js
          node scripts/validate-app-bundle-split.js
          node scripts/build-app-bundle.js
          cmp app.bundle.js /tmp/app.bundle.original.js
          node scripts/validate-app-bundle-split.js

      - name: Commit refined fragments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-bundle scripts/refine-app-bundle-fragments.js README_APP_BUNDLE_SPLIT.md
          if git diff --cached --quiet; then
            echo "No refinement changes."
            exit 0
          fi
          git commit -m "Refine oversized app bundle fragments"
          git push origin HEAD:${{ github.head_ref }}
