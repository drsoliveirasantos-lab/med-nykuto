name: Export Fisiologia practice bank artifact

on:
  pull_request:
    branches:
      - preview
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'export/fisiologia-bank-artifact'
    name: Package Fisiologia practice bank
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: preview

      - name: Prepare export files
        run: |
          mkdir -p export
          cp data/practice-bank-fisiologia.js export/practice-bank-fisiologia.js
          cat > export/README.txt <<'EOF'
          Source: data/practice-bank-fisiologia.js
          Branch: preview
          Purpose: export before splitting Fisiologia practice bank into module-level source files.
          EOF
          ls -lh export

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: practice-bank-fisiologia-export
          path: export/*
          if-no-files-found: error
