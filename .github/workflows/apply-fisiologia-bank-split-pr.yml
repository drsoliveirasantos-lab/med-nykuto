name: Apply Fisiologia bank split from PR

on:
  pull_request:
    branches:
      - preview
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  split:
    if: github.head_ref == 'refactor/split-fisiologia-practice-bank'
    name: Generate split bank sources on PR branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Split and validate Fisiologia bank
        run: |
          node scripts/split-practice-bank-fisiologia.js
          node scripts/validate-practice-bank-fisiologia.js
          cp data/practice-bank-fisiologia.js /tmp/practice-bank-fisiologia.original.js
          node scripts/build-practice-bank-fisiologia.js
          node scripts/validate-practice-bank-fisiologia.js
          cmp data/practice-bank-fisiologia.js /tmp/practice-bank-fisiologia.original.js

      - name: Commit generated split sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/practice/fisiologia scripts/split-practice-bank-fisiologia.js scripts/build-practice-bank-fisiologia.js scripts/validate-practice-bank-fisiologia.js README_FISIOLOGIA_BANK_SPLIT.md
          if git diff --cached --quiet; then
            echo "No split source changes."
            exit 0
          fi
          git commit -m "Generate Fisiologia split practice bank sources"
          git push origin HEAD:${{ github.head_ref }}
