name: Rebuild split course data

on:
  workflow_dispatch:
  push:
    branches:
      - refactor/split-courses-data
    paths:
      - content/**
      - scripts/build-courses-data.js
      - .github/workflows/rebuild-split-course-data.yml

permissions:
  contents: write

jobs:
  rebuild:
    name: Build and commit data/med-courses-data.js
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/split-courses-data
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild generated course data
        run: |
          node scripts/build-courses-data.js
          node scripts/validate-course-sources.js
          node - <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const code = fs.readFileSync('data/med-courses-data.js','utf8');
          const sandbox = { window: {} };
          vm.createContext(sandbox);
          vm.runInContext(code, sandbox);
          const data = sandbox.window.MED_COURSES_DATA;
          if(!data || data.totalModules !== 59) throw new Error(`Expected 59 modules, got ${data && data.totalModules}`);
          const fisiologia = data.courses.find(c => c.id === 'fisiologia');
          if(!fisiologia || fisiologia.modules.length !== 10) throw new Error('Fisiología must have 10 modules');
          const text = code;
          if(/[ÃÂâ]/.test(text)) throw new Error('Generated data still contains mojibake markers');
          console.log('Generated data OK:', data.totalModules, 'modules');
          NODE

      - name: Commit rebuilt data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/med-courses-data.js scripts/build-courses-data.js
          if git diff --cached --quiet; then
            echo "No generated data changes."
            exit 0
          fi
          git commit -m "Rebuild split course data without mojibake"
          git push origin HEAD:refactor/split-courses-data
