name: Med Nykuto site tests

on:
  workflow_dispatch:
  push:
    branches: [preview]
  pull_request:
    branches: [preview]

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: med-nykuto-site-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate restored site data
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Validate static links and release markers
        continue-on-error: true
        run: |
          node scripts/validate-site-links.js || echo "Static hygiene validator reported warnings; continuing to browser regression tests."
      - name: Validate restored data volumes
        continue-on-error: true
        run: |
          node scripts/validate-data-health.js || echo "Data health validator reported warnings; continuing to browser regression tests."
      - name: Validate restored course assets
        continue-on-error: true
        run: |
          node scripts/validate-course-assets.js || echo "Course asset validator reported warnings; continuing to browser regression tests."
      - name: Validate site manifest
        continue-on-error: true
        run: |
          node scripts/validate-site-manifest.js || echo "Manifest validator reported warnings; continuing to browser regression tests."

  browser-smoke:
    name: Browser smoke tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: |
          set +e
          npx playwright test tests/smoke.spec.js --project=desktop-chromium --reporter=json > smoke.json
          code=$?
          node scripts/print-playwright-summary.js smoke.json
          exit $code

  browser-restored-data:
    name: Browser restored-data tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run restored-data tests
        run: |
          set +e
          npx playwright test tests/restored-data.spec.js --project=desktop-chromium --reporter=json > restored-data.json
          code=$?
          node scripts/print-playwright-summary.js restored-data.json
          exit $code

  browser-practice-flow:
    name: Browser practice-flow tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run practice-flow tests
        run: |
          set +e
          npx playwright test tests/practice-flow.spec.js --project=desktop-chromium --reporter=json > practice-flow.json
          code=$?
          node scripts/print-playwright-summary.js practice-flow.json
          exit $code

  browser-real-click:
    name: Browser real-click and QCM critical tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run real-click and QCM critical tests
        run: |
          set +e
          npx playwright test tests/real-click-regression.spec.js tests/qcm-critical-clicks.spec.js --project=desktop-chromium --trace=retain-on-failure --output=test-results/real-click --reporter=json > real-click.json
          code=$?
          node scripts/print-playwright-summary.js real-click.json
          exit $code
      - name: Upload real-click evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-click-evidence
          if-no-files-found: ignore
          path: |
            real-click.json
            test-results/real-click/**
            playwright-report/**

  browser-module-ui:
    name: Browser module UI regression tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run module UI regression tests
        run: |
          set +e
          npx playwright test tests/module-ui-regression.spec.js --project=desktop-chromium --reporter=json > module-ui.json
          code=$?
          node scripts/print-playwright-summary.js module-ui.json
          exit $code

  browser-click-audit:
    name: Browser click-audit tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run click-audit tests
        run: |
          set +e
          npx playwright test tests/click-audit.spec.js --project=desktop-chromium --trace=retain-on-failure --output=test-results/click-audit --reporter=json > click-audit.json
          code=$?
          node scripts/print-playwright-summary.js click-audit.json
          exit $code
      - name: Upload click-audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: click-audit-evidence
          if-no-files-found: ignore
          path: |
            click-audit.json
            test-results/click-audit/**
            playwright-report/**

  browser-mobile-menu:
    name: Browser mobile-menu tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run mobile-menu tests
        run: |
          set +e
          npx playwright test tests/mobile-menu.spec.js --project=desktop-chromium --reporter=json > mobile-menu.json
          code=$?
          node scripts/print-playwright-summary.js mobile-menu.json
          exit $code

  browser-contact:
    name: Browser contact tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run contact tests
        run: |
          set +e
          npx playwright test tests/contact.spec.js --project=desktop-chromium --reporter=json > contact.json
          code=$?
          node scripts/print-playwright-summary.js contact.json
          exit $code

  notify-status:
    name: Publish CI status comment
    needs:
      - validate
      - browser-smoke
      - browser-restored-data
      - browser-practice-flow
      - browser-real-click
      - browser-module-ui
      - browser-click-audit
      - browser-mobile-menu
      - browser-contact
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment CI status on issue #1
        uses: actions/github-script@v7
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          script: |
            const issue_number = 1;
            const needs = JSON.parse(process.env.NEEDS_JSON || '{}');
            const entries = Object.entries(needs);
            const failed = entries.filter(([, job]) => job.result !== 'success');
            const conclusion = failed.length ? 'failure' : 'success';
            const emoji = conclusion === 'success' ? '✅' : '❌';
            const title = `${emoji} Med Nykuto site tests #${context.runNumber} — ${conclusion.toUpperCase()}`;
            const lines = entries.map(([id, job]) => `- ${job.result === 'success' ? '✅' : '❌'} ${id}: \`${job.result}\``);
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              title,
              '',
              `- Branch: \`${context.ref.replace('refs/heads/', '')}\``,
              `- Commit: \`${sha}\``,
              `- Run: ${runUrl}`,
              '',
              'Jobs:',
              ...lines,
              '',
              '<!-- med-nykuto-site-tests-status -->'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });
