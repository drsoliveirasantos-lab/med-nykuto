          exit $code

  browser-real-click:
    name: Browser real-click and QCM critical tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run real-click and QCM critical tests
        run: |
          set +e
          npx playwright test tests/real-click-regression.spec.js tests/qcm-critical-clicks.spec.js tests/qcm-transition-stability.spec.js --project=desktop-chromium --workers=1 --trace=retain-on-failure --output=test-results/real-click --reporter=json > real-click.json
          code=$?
          node scripts/print-playwright-summary.js real-click.json
          exit $code
      - name: Upload real-click evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-click-evidence
          if-no-files-found: ignore
          path: |
            real-click.json
            test-results/real-click/**
            playwright-report/**

