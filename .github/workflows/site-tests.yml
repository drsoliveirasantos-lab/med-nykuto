name: Med Nykuto site tests

on:
  workflow_dispatch:
  push:
    branches: [preview, main]
  pull_request:
    branches: [preview, main]

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: med-nykuto-site-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate restored site data
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Validate static links and release markers
        continue-on-error: true
        run: |
          node scripts/validate-site-links.js || echo "Static hygiene validator reported warnings; continuing to browser regression tests."
      - name: Validate restored data volumes
        continue-on-error: true
        run: |
          node scripts/validate-data-health.js || echo "Data health validator reported warnings; continuing to browser regression tests."
      - name: Validate restored course assets
        continue-on-error: true
        run: |
          node scripts/validate-course-assets.js || echo "Course asset validator reported warnings; continuing to browser regression tests."
      - name: Validate site manifest
        continue-on-error: true
        run: |
          node scripts/validate-site-manifest.js || echo "Manifest validator reported warnings; continuing to browser regression tests."

  static-strict-html-js-health:
    name: Static strict HTML/JS health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate strict HTML/JS references
        run: node scripts/validate-strict-html-js-health.js

  protected-data-guard:
    name: Protected data guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Ensure protected bank files were not changed accidentally
        run: node scripts/protected-data-guard.js

  seo-health:
    name: SEO health tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate SEO, sitemap and visible branding
        run: node scripts/validate-seo-health.js

  data-question-bank-deep-integrity:
    name: Question bank deep integrity
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate question bank deep integrity
        run: node scripts/validate-question-bank-deep-integrity.js

  browser-smoke:
    name: Browser smoke tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: |
          set +e
          npx playwright test tests/smoke.spec.js --project=desktop-chromium --reporter=json > smoke.json
          code=$?
          node scripts/print-playwright-summary.js smoke.json
          exit $code

  browser-restored-data:
    name: Browser restored-data tests
    needs: validate
