name: Med Nykuto site tests

on:
  workflow_dispatch:
  push:
    branches: [preview]
  pull_request:
    branches: [preview]

concurrency:
  group: med-nykuto-site-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate restored site data
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Validate static links and release markers
        run: node scripts/validate-site-links.js
      - name: Validate restored data volumes
        run: node scripts/validate-data-health.js
      - name: Validate restored course assets
        run: node scripts/validate-course-assets.js
      - name: Validate site manifest
        run: node scripts/validate-site-manifest.js

  browser-smoke:
    name: Browser smoke tests
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: |
          set +e
          npx playwright test tests/smoke.spec.js --project=desktop-chromium --reporter=json > smoke.json
          code=$?
          node scripts/print-playwright-summary.js smoke.json
          exit $code

