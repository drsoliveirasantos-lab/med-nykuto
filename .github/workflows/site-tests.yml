name: Med Nykuto site tests

on:
  workflow_dispatch:
  push:
    branches: [preview]
  pull_request:
    branches: [preview]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate static links and release markers
        run: node scripts/validate-site-links.js

      - name: Validate restored data volumes
        run: node scripts/validate-data-health.js

      - name: Validate restored course assets
        run: node scripts/validate-course-assets.js

      - name: Validate site manifest
        run: node scripts/validate-site-manifest.js

      - name: Browser tests
        run: npx playwright test --project=desktop-chromium
