name: Med Nykuto site tests

on:
  workflow_dispatch:
  push:
    branches: [preview, main]
  pull_request:
    branches: [preview, main]

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: med-nykuto-site-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Static, data and quality validation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Validate static links and release markers
        run: node scripts/validate-site-links.js || echo "Static hygiene validator reported warnings; continuing."
      - name: Validate restored data volumes
        run: node scripts/validate-data-health.js || echo "Data health validator reported warnings; continuing."
      - name: Validate restored course assets
        run: node scripts/validate-course-assets.js || echo "Course asset validator reported warnings; continuing."
      - name: Validate site manifest
        run: node scripts/validate-site-manifest.js || echo "Manifest validator reported warnings; continuing."
      - name: Validate strict HTML/JS references
        run: node scripts/validate-strict-html-js-health.js
      - name: Ensure protected bank files were not changed accidentally
        run: node scripts/protected-data-guard.js
      - name: Validate SEO, sitemap and visible branding
        run: node scripts/validate-seo-health.js
      - name: Validate question bank deep integrity
        run: node scripts/validate-question-bank-deep-integrity.js
      - name: Upload question bank quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: question-bank-quality-report
          if-no-files-found: ignore
          path: |
            reports/question-bank-quality-report.json
            reports/question-bank-quality-report.txt

  browser-desktop-core:
    name: Browser desktop core regression tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run desktop core regression tests
        run: |
          set +e
          npx playwright test \
            tests/smoke.spec.js \
            tests/restored-data.spec.js \
            tests/practice-flow.spec.js \
            tests/real-click-regression.spec.js \
            tests/qcm-critical-clicks.spec.js \
            tests/qcm-transition-stability.spec.js \
            tests/module-ui-regression.spec.js \
            tests/click-audit.spec.js \
            tests/cases-critical.spec.js \
            tests/vf-critical.spec.js \
            tests/no-navigation-regression.spec.js \
            tests/runtime-conflict.spec.js \
            tests/cache-version-integrity.spec.js \
            tests/report-error-critical.spec.js \
            tests/performance-regression-light.spec.js \
            tests/student-full-journey.spec.js \
            tests/progress-and-mistakes-storage.spec.js \
            tests/course-module-integrity.spec.js \
            tests/no-blank-page-matrix.spec.js \
            tests/console-error-guard.spec.js \
            --project=desktop-chromium --workers=1 --trace=retain-on-failure --output=test-results/desktop-core --reporter=json > desktop-core.json
          code=$?
          node scripts/print-playwright-summary.js desktop-core.json
          exit $code
      - name: Upload desktop core evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-core-evidence
          if-no-files-found: ignore
          path: |
            desktop-core.json
            test-results/desktop-core/**
            playwright-report/**

  browser-mobile-critical:
    name: Browser mobile Safari-shape critical tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium and WebKit with timeout
        run: timeout 300s npx playwright install --with-deps chromium webkit
      - name: Run mobile touch critical tests
        run: |
          set +e
          npx playwright test tests/mobile-touch-critical.spec.js --project=mobile-safari-shape --trace=retain-on-failure --output=test-results/mobile-touch --reporter=json > mobile-touch.json
          code=$?
          node scripts/print-playwright-summary.js mobile-touch.json
          exit $code
      - name: Upload mobile touch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-touch-evidence
          if-no-files-found: ignore
          path: |
            mobile-touch.json
            test-results/mobile-touch/**
            playwright-report/**

  browser-deployed-visual-a11y:
    name: Browser deployed, visual and accessibility tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run deployed, visual and accessibility tests
        env:
          DEPLOYED_PREVIEW_BASE_URL: https://preview.med-nykuto-git.pages.dev
        run: |
          set +e
          npx playwright test \
            tests/deployed-preview-smoke.spec.js \
            tests/visual-snapshots.spec.js \
            tests/accessibility-light.spec.js \
            --project=desktop-chromium --workers=1 --trace=retain-on-failure --output=test-results/deployed-visual-a11y --reporter=json > deployed-visual-a11y.json
          code=$?
          node scripts/print-playwright-summary.js deployed-visual-a11y.json
          exit $code
      - name: Upload deployed, visual and accessibility evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployed-visual-a11y-evidence
          if-no-files-found: ignore
          path: |
            deployed-visual-a11y.json
            test-results/deployed-visual-a11y/**
            test-results/visual-snapshots/**
            playwright-report/**

  browser-lot2-visible-features:
    name: Browser lot 2 visible feature tests
    needs: validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 24
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install Playwright Chromium with timeout
        run: timeout 240s npx playwright install --with-deps chromium
      - name: Run lot 2 exam, contact, Pix and responsive tests
        run: |
          set +e
          npx playwright test \
            tests/exam-mode-critical.spec.js \
            tests/contact-support-pix.spec.js \
            tests/responsive-layout-matrix.spec.js \
            --project=desktop-chromium --workers=1 --trace=retain-on-failure --output=test-results/lot2-visible-features --reporter=json > lot2-visible-features.json
          code=$?
          node scripts/print-playwright-summary.js lot2-visible-features.json
          exit $code
      - name: Upload lot 2 visible feature evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lot2-visible-features-evidence
          if-no-files-found: ignore
          path: |
            lot2-visible-features.json
            test-results/lot2-visible-features/**
            playwright-report/**
