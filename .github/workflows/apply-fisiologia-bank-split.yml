name: Apply Fisiologia practice bank split

on:
  workflow_dispatch:
  push:
    branches:
      - refactor/split-fisiologia-practice-bank
    paths:
      - scripts/split-practice-bank-fisiologia.js
      - scripts/build-practice-bank-fisiologia.js
      - scripts/validate-practice-bank-fisiologia.js
      - README_FISIOLOGIA_BANK_SPLIT.md
      - .github/workflows/apply-fisiologia-bank-split.yml

permissions:
  contents: write

jobs:
  split:
    name: Generate split Fisiologia bank sources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout split branch
        uses: actions/checkout@v4
        with:
          ref: refactor/split-fisiologia-practice-bank
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Split and validate Fisiologia bank
        run: |
          node scripts/split-practice-bank-fisiologia.js
          node scripts/validate-practice-bank-fisiologia.js
          cp data/practice-bank-fisiologia.js /tmp/practice-bank-fisiologia.original.js
          node scripts/build-practice-bank-fisiologia.js
          node scripts/validate-practice-bank-fisiologia.js
          cmp data/practice-bank-fisiologia.js /tmp/practice-bank-fisiologia.original.js

      - name: Commit split sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/practice/fisiologia scripts/split-practice-bank-fisiologia.js scripts/build-practice-bank-fisiologia.js scripts/validate-practice-bank-fisiologia.js README_FISIOLOGIA_BANK_SPLIT.md .github/workflows/apply-fisiologia-bank-split.yml
          if git diff --cached --quiet; then
            echo "No split source changes to commit."
            exit 0
          fi
          git commit -m "Split Fisiologia practice bank into module sources"
          git push origin HEAD:refactor/split-fisiologia-practice-bank
