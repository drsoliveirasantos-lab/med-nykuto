name: Extract DOM source from PR

on:
  pull_request:
    branches:
      - preview
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  extract:
    if: github.head_ref == 'refactor/extract-dom-source'
    name: Extract app bundle DOM fragments
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract DOM, rebuild and validate app.bundle.js
        run: |
          cp app.bundle.js /tmp/app.bundle.original.js
          node scripts/extract-app-bundle-dom.js
          node scripts/validate-app-bundle-split.js
          node scripts/build-app-bundle.js
          cmp app.bundle.js /tmp/app.bundle.original.js
          node scripts/validate-app-bundle-split.js

      - name: Commit extracted DOM source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-bundle src/dom scripts/extract-app-bundle-dom.js README_APP_BUNDLE_SPLIT.md
          if git diff --cached --quiet; then
            echo "No DOM extraction changes."
            exit 0
          fi
          git commit -m "Extract app bundle DOM fragments"
          git push origin HEAD:${{ github.head_ref }}
