name: Med Nykuto real click UI debug

on:
  workflow_dispatch:

concurrency:
  group: med-nykuto-real-click-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-click-debug:
    name: Real click UI debug
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Quiet clone and test real clicks
        run: |
          set -e
          git clone --quiet --depth=1 --branch preview https://x-access-token:${{ github.token }}@github.com/drsoliveirasantos-lab/med-nykuto.git .
          npm install --silent >/tmp/npm-install.log 2>&1 || { cat /tmp/npm-install.log; exit 1; }
          timeout 240s npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1 || { tail -80 /tmp/playwright-install.log; exit 1; }
          npx playwright test tests/real-click-regression.spec.js --project=desktop-chromium --reporter=line
