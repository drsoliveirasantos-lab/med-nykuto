name: Apply split course migration ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - refactor/split-courses-data
    paths:
      - med_nykuto_split_courses_module10_migration.zip

permissions:
  contents: write

jobs:
  apply:
    name: Unzip migration and commit generated sources
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/split-courses-data
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure ZIP is present
        run: |
          test -f med_nykuto_split_courses_module10_migration.zip
          ls -lh med_nykuto_split_courses_module10_migration.zip

      - name: Unpack migration ZIP
        run: |
          rm -rf /tmp/med-nykuto-split-migration
          mkdir -p /tmp/med-nykuto-split-migration
          unzip -q med_nykuto_split_courses_module10_migration.zip -d /tmp/med-nykuto-split-migration
          find /tmp/med-nykuto-split-migration -maxdepth 2 -type d -print

      - name: Apply migration files
        run: |
          SRC="/tmp/med-nykuto-split-migration/med_nykuto_course_split_migration"
          test -d "$SRC"
          rm -rf content
          mkdir -p content
          cp -R "$SRC/content" .
          cp -R "$SRC/assets" .
          cp -R "$SRC/data" .
          cp -R "$SRC/scripts" .
          cp "$SRC/content-lock.json" .
          cp "$SRC/split_migration_manifest.json" .
          cp "$SRC/README_SPLIT_MIGRATION.md" .
          rm -f med_nykuto_split_courses_module10_migration.zip

      - name: Validate and rebuild data
        run: |
          node scripts/validate-course-sources.js
          node scripts/build-courses-data.js
          node scripts/validate-course-sources.js

      - name: Commit generated migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content assets data scripts content-lock.json split_migration_manifest.json README_SPLIT_MIGRATION.md .github/workflows/apply-split-migration-zip.yml
          git rm -f med_nykuto_split_courses_module10_migration.zip || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Apply split course migration and add physiology module 10"
          git push origin HEAD:refactor/split-courses-data
